    <link rel="apple-touch-icon" href="/kawan-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kawan</title>
    <meta name="description" content="Kawan — a skeptical, voiced accountability companion to keep you productive." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kawan-frontend.vercel.app/" />
    <meta property="og:title" content="Kawan" />
    <meta
      property="og:description"
      content="Kawan — a skeptical, voiced accountability companion to keep you productive."
    />
    <meta property="og:image" content="https://kawan-frontend.vercel.app/embed/kawan-banner.png" />
    <meta property="og:image:width" content="1730" />
    <meta property="og:image:height" content="909" />
    <meta property="og:image:alt" content="Kawan app social preview banner" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kawan" />
    <meta
      name="twitter:description"
      content="Kawan — a skeptical, voiced accountability companion to keep you productive."
    />
    <meta name="twitter:image" content="https://kawan-frontend.vercel.app/embed/kawan-banner.png" />
    <!-- Fonts: Fredoka (body + display + wordmark) + Fraunces (character voice) — design.md §3 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400;1,9..144,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Theme init: run synchronously before first paint to avoid flash -->
    <script>
      ;(() => {
        try {
          const stored = localStorage.getItem('kawan-theme')
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.dataset.theme = stored
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.dataset.theme = 'dark'
          }
        } catch (_e) {}
      })()
    </script>
    <div id="root"></div>
    <!-- Cubism core MUST load via <script> before the ES module bundle.
         Bundling live2dcubismcore breaks its global init (spike gotcha 1). -->
    <script src="/live2dcubismcore.min.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
