<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/kawan-logo.png" />
    <link rel="apple-touch-icon" href="/kawan-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kawan</title>
    <!-- Fonts: Fraunces (display/headings/character voice) + Inter (UI/body) — design.md §3 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400;1,9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Theme init: run synchronously before first paint to avoid flash -->
    <script>
      ;(() => {
        try {
          const stored = localStorage.getItem('kawan-theme')
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.dataset.theme = stored
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.dataset.theme = 'dark'
          }
        } catch (_e) {}
      })()
    </script>
    <div id="root"></div>
    <!-- Cubism core MUST load via <script> before the ES module bundle.
         Bundling live2dcubismcore breaks its global init (spike gotcha 1). -->
    <script src="/live2dcubismcore.min.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
