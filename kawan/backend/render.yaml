services:
  - type: web
    name: kawan-backend
    runtime: python
    rootDir: kawan/backend
    buildCommand: uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    numInstances: 1
    envVars:
      # --- Database ---
      # Use the Supabase Supavisor pooler URL (see DEPLOY.md for session vs transaction pooler choice).
      # Set this as a secret in the Render dashboard — never commit the real value.
      - key: KAWAN_DATABASE_URL
        sync: false
      # --- Session / encryption ---
      # Generate fresh values: python -c "import secrets; print(secrets.token_hex(32))"
      # Fernet key: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - key: KAWAN_SESSION_SECRET
        sync: false
      - key: KAWAN_FERNET_KEY
        sync: false
      # --- CORS / redirects (fill after Vercel deploy) ---
      - key: KAWAN_FRONTEND_ORIGIN
        sync: false
      - key: KAWAN_FRONTEND_POST_LOGIN_REDIRECT
        sync: false
      - key: KAWAN_SIWC_REDIRECT_URI
        sync: false
      # --- Cross-origin cookies (required when Vercel /ws connects directly to Render) ---
      - key: KAWAN_COOKIE_SAMESITE
        value: none
      - key: KAWAN_COOKIE_SECURE
        value: 'true'
      # --- Chutes / SIWC ---
      - key: KAWAN_SIWC_CLIENT_ID
        sync: false
      - key: KAWAN_SIWC_CLIENT_SECRET
        sync: false
      - key: KAWAN_SIWC_APP_ID
        sync: false
      - key: KAWAN_CHUTES_API_KEY
        sync: false
      - key: KAWAN_GEMINI_API_KEY
        sync: false
